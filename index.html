<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Worksphere</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="shared-header.css">
	<style>
		:root {
			--bg-color: #ffffff;
			--glass-bg: rgba(0, 0, 0, 0.7);
			--glass-border: rgba(255, 255, 255, 0.08);
			--text-color: rgba(255, 255, 255, 0.85);
			--text-hover: #ffffff;
			--btn-hover-bg: rgba(255, 255, 255, 0.12);
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Outfit', sans-serif;
		}

		body {
			background-color: var(--bg-color);
			background-image:
				radial-gradient(at 10% 20%, hsla(28, 100%, 74%, 0.3) 0px, transparent 50%),
				radial-gradient(at 80% 10%, hsla(189, 100%, 56%, 0.2) 0px, transparent 50%),
				radial-gradient(at 50% 50%, hsla(355, 100%, 93%, 0.5) 0px, transparent 50%);
			background-size: cover;
			background-attachment: fixed;
			min-height: 200vh;
			/* Showcasing the scroll effect */
			color: #111;
		}



		/* Demo Hero Content */
		.hero {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			text-align: center;
			padding: 0 2rem;
		}

		.hero h1 {
			font-size: 5rem;
			font-weight: 600;
			margin-bottom: 1rem;
			color: #1a1a1a;
			letter-spacing: -2px;
			opacity: 0;
			animation: fadeIn 1s 0.3s forwards;
		}

		.hero p {
			font-size: 1.25rem;
			color: #666;
			max-width: 500px;
			line-height: 1.6;
			opacity: 0;
			animation: fadeIn 1s 0.6s forwards;
		}

		@keyframes fadeIn {
			to {
				opacity: 1;
			}
		}
	</style>
</head>

<body>

	<header class="glass-header-container">
		<nav>
			<ul class="nav-links">
				<li><a href="./index.html" class="nav-btn logo-btn" style="text-decoration: none; display: inline-block;">Worksphere</a></li>
				<li class="nav-separator">|</li>
				<li><a href="./labs/index.html" class="nav-btn" style="text-decoration: none; display: inline-block;">Labs</a></li>
				<li><a href="./industrial/index.html" class="nav-btn" style="text-decoration: none; display: inline-block;">Industrial</a></li>
				<li><a href="./corporate/index.html" class="nav-btn" style="text-decoration: none; display: inline-block;">Corporate</a></li>
			</ul>
		</nav>
	</header>

	<main>
		<section class="hero">
			<h1>Worksphere</h1>
		</section>
	</main>

</body>

</html>
